name: Coverage and SonarQube

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - master

permissions:
  contents: read
  pull-requests: read

jobs:
  coverage:
    name: Build, coverage, and analysis
    runs-on: ubuntu-latest

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests and generate coverage
        run: ./mvnw -B clean verify

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Prepare frontend sources for analysis
        working-directory: frontend
        run: |
          npm ci
          npm run generate:api

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Analyze with SonarQube Cloud
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar

      - name: Add coverage summary
        if: always()
        run: |
          if [ ! -f target/site/jacoco/jacoco.csv ]; then
            {
              echo "## JaCoCo Coverage"
              echo
              echo "Coverage report was not generated."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          awk -F',' '
            NR > 1 {
              instruction_missed += $4
              instruction_covered += $5
              branch_missed += $6
              branch_covered += $7
              line_missed += $8
              line_covered += $9
              method_missed += $12
              method_covered += $13
            }
            function pct(covered, missed) {
              total = covered + missed
              return total == 0 ? "n/a" : sprintf("%.2f%%", covered * 100 / total)
            }
            END {
              print "## JaCoCo Coverage"
              print ""
              print "| Metric | Covered | Missed | Coverage |"
              print "| --- | ---: | ---: | ---: |"
              print "| Instructions | " instruction_covered " | " instruction_missed " | " pct(instruction_covered, instruction_missed) " |"
              print "| Branches | " branch_covered " | " branch_missed " | " pct(branch_covered, branch_missed) " |"
              print "| Lines | " line_covered " | " line_missed " | " pct(line_covered, line_missed) " |"
              print "| Methods | " method_covered " | " method_missed " | " pct(method_covered, method_missed) " |"
              print ""
              print "Download the `jacoco-coverage-report` artifact from this workflow run for the full HTML report."
            }
          ' target/site/jacoco/jacoco.csv >> "$GITHUB_STEP_SUMMARY"

      - name: Upload HTML coverage report
        if: ${{ always() && hashFiles('target/site/jacoco/index.html') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco
          retention-days: 14
